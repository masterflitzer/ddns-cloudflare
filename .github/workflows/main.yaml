name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow_ref }}

jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: lint
        run: cargo clippy --all-features

      - name: check formatting
        run: cargo fmt --all --check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - name: check
        run: cargo check

      - name: build
        run: cargo build

      - name: test
        run: cargo test

  deploy:
    permissions:
      contents: write
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
          - x86_64-unknown-freebsd
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - name: install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: cross compile
        env:
          target: ${{ matrix.target }}
        run: |
          set -o errexit -o nounset -o pipefail

          os="$(cut -d - -f 3 <<< "${target}")"
          arch="$(cut -d - -f 1 <<< "${target}")"

          cross build -r --locked --target "${target}" --message-format json-render-diagnostics > /tmp/cargo-build-output.json

          jq -r 'select(.executable != null) | .executable' /tmp/cargo-build-output.json > /tmp/cargo-bin.txt

          bin="$(tail -n 1 /tmp/cargo-bin.txt)"
          bin="$(realpath "${bin#/}")"
          name="${os}-${arch}-$(basename "${bin}")"
          mv "${bin}" "/tmp/${name}"
          bin="/tmp/${name}"

          test -f "${bin}"
          chmod 0755 "${bin}"
          echo "bin=${bin}" >> "${GITHUB_ENV}"

      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
          release_commit: ${{ github.sha }}
          release_tag: ${{ github.ref_name }}
        run: |
          set -o errexit -o nounset -o pipefail

          gh release create "${release_tag}" -t "${release_tag}" -n "Release: ${release_tag}" --target "${release_commit}" --verify-tag \
          || gh release view "${release_tag}" > /dev/null

          gh release upload "${release_tag}" "${bin}"
